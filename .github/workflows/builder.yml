name: Build IMAGEWTY-Tool

on:
  push:
  pull_request:
  release:
    types: [created]

jobs:

# -------------------------------------------------
# Linux / Windows / Android builds
# -------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-multilib \
            mingw-w64 \
            unzip \
            wget

      - name: Build Linux x64
        run: make linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagewty-linux-buildsa
          path: |
            imagewty-tool*

      - name: Build Linux x86
        run: make linux32

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagewty-linux-buildsb
          path: |
            imagewty-tool*

      - name: Build Windows x64
        run: make win64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagewty-linux-buildsc
          path: |
            imagewty-tool*

      - name: Build Windows x86
        run: make win32

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagewty-linux-buildsd
          path: |
            imagewty-tool*

      # -------------------------
      # Android NDK
      # -------------------------
      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "$PWD/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build Android ARMv7
        run: make android-armv7

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagewty-linux-buildse
          path: |
            imagewty-tool*

      - name: Build Android ARM64
        run: make android-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagewty-linux-buildsf
          path: |
            imagewty-tool*
#            imagewty-tool-linux
#            imagewty-tool-linux-x86
#            imagewty-tool-win64.exe
#            imagewty-tool-win32.exe
#            imagewty-tool-android-armv7
#            imagewty-tool-android-arm64

# -------------------------------------------------
# macOS builds
# -------------------------------------------------
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS Intel
        run: make macos-intel

      - name: Build macOS ARM
        run: make macos-arm

      - name: Create Universal Binary
        run: |
          lipo -create \
            imagewty-tool-macos-x86_64 \
            imagewty-tool-macos-arm64 \
            -output imagewty-tool-macos

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagewty-macos-builds
          path: |
            imagewty-tool-macos
            imagewty-tool-macos-x86_64
            imagewty-tool-macos-arm64


# -------------------------------------------------
# Release packaging
# -------------------------------------------------
  release:
    if: github.event_name == 'release'
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/imagewty-tool-linux
            **/imagewty-tool-linux-x86
            **/imagewty-tool-win64.exe
            **/imagewty-tool-win32.exe
            **/imagewty-tool-macos
            **/imagewty-tool-android-armv7
            **/imagewty-tool-android-arm64
